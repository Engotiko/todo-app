<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yapılacaklar Listesi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      width: 100%;
      max-width: 460px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      font-size: 1.5rem;
      color: #333;
    }

    header p {
      margin-top: 4px;
      font-size: 0.85rem;
      color: #888;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e2e2e2;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #764ba2;
    }

    .input-row button {
      padding: 0 20px;
      border: none;
      background: #764ba2;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #5d3a85;
    }

    .filters {
      display: flex;
      gap: 8px;
      padding: 0 24px 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 1px solid #e2e2e2;
      background: #fff;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #764ba2;
      color: #fff;
      border-color: #764ba2;
    }

    ul {
      list-style: none;
      max-height: 340px;
      overflow-y: auto;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f2f2f2;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #764ba2;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li .delete {
      border: none;
      background: transparent;
      color: #d33;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    li .delete:hover {
      opacity: 1;
    }

    .empty {
      padding: 30px 24px;
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      border-top: 1px solid #eee;
      font-size: 0.82rem;
      color: #888;
    }

    footer button {
      border: none;
      background: transparent;
      color: #d33;
      cursor: pointer;
      font-size: 0.82rem;
    }

    footer button:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>📝 Yapılacaklar Listesi</h1>
      <p>Görevlerini ekle, tamamla ve takip et</p>
    </header>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Yeni görev ekle..." />
      <button id="addBtn">Ekle</button>
    </div>

    <div class="filters">
      <button data-filter="all" class="active">Tümü</button>
      <button data-filter="active">Aktif</button>
      <button data-filter="done">Tamamlanan</button>
    </div>

    <ul id="taskList"></ul>

    <footer>
      <span id="counter">0 görev</span>
      <button id="clearDone">Tamamlananları temizle</button>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== Supabase ayarları =====
    // Aşağıdaki iki değeri Supabase Dashboard > Project Settings > API
    // sayfasından alıp doldur:
    const SUPABASE_URL = "https://cerskzqqlhruzvqcbxgr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlcnNrenFxbGhydXp2cWNieGdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NzI0NDQsImV4cCI6MjA5NjA0ODQ0NH0.tteIiwPPa18Xdlm5D0__DCZzscpZOyHJXRcXVJsUhmU";

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // =============================

    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const counter = document.getElementById("counter");
    const clearDone = document.getElementById("clearDone");
    const filterBtns = document.querySelectorAll(".filters button");

    let tasks = [];
    let filter = "all";

    async function loadTasks() {
      const { data, error } = await db
        .from("todos")
        .select("*")
        .order("inserted_at", { ascending: true });
      if (error) {
        console.error(error);
        alert("Görevler yüklenemedi: " + error.message);
        return;
      }
      tasks = data;
      render();
    }

    function render() {
      taskList.innerHTML = "";

      const filtered = tasks.filter((t) => {
        if (filter === "active") return !t.done;
        if (filter === "done") return t.done;
        return true;
      });

      if (filtered.length === 0) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "Henüz görev yok 🎉";
        taskList.appendChild(li);
      }

      filtered.forEach((task) => {
        const li = document.createElement("li");
        if (task.done) li.classList.add("done");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => toggleTask(task.id));

        const span = document.createElement("span");
        span.textContent = task.text;

        const del = document.createElement("button");
        del.className = "delete";
        del.innerHTML = "&times;";
        del.addEventListener("click", () => deleteTask(task.id));

        li.append(checkbox, span, del);
        taskList.appendChild(li);
      });

      const remaining = tasks.filter((t) => !t.done).length;
      counter.textContent = `${remaining} görev kaldı`;
    }

    async function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      taskInput.value = "";
      const { data, error } = await db
        .from("todos")
        .insert({ text, done: false })
        .select()
        .single();
      if (error) {
        console.error(error);
        alert("Görev eklenemedi: " + error.message);
        return;
      }
      tasks.push(data);
      render();
    }

    async function toggleTask(id) {
      const task = tasks.find((t) => t.id === id);
      if (!task) return;
      const { error } = await db
        .from("todos")
        .update({ done: !task.done })
        .eq("id", id);
      if (error) {
        console.error(error);
        alert("Güncellenemedi: " + error.message);
        return;
      }
      task.done = !task.done;
      render();
    }

    async function deleteTask(id) {
      const { error } = await db.from("todos").delete().eq("id", id);
      if (error) {
        console.error(error);
        alert("Silinemedi: " + error.message);
        return;
      }
      tasks = tasks.filter((t) => t.id !== id);
      render();
    }

    addBtn.addEventListener("click", addTask);
    taskInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addTask();
    });

    clearDone.addEventListener("click", async () => {
      const { error } = await db.from("todos").delete().eq("done", true);
      if (error) {
        console.error(error);
        alert("Temizlenemedi: " + error.message);
        return;
      }
      tasks = tasks.filter((t) => !t.done);
      render();
    });

    filterBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        filterBtns.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        filter = btn.dataset.filter;
        render();
      });
    });

    loadTasks();
  </script>
</body>
</html>
