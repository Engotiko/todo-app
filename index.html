<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yapılacaklar Listesi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      width: 100%;
      max-width: 460px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid #eee;
    }

    header h1 { font-size: 1.5rem; color: #333; }
    header p { margin-top: 4px; font-size: 0.85rem; color: #888; }

    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    /* ---- Auth / OTP ---- */
    .auth-tabs { display: flex; padding: 16px 24px 0; gap: 8px; }
    .auth-tabs button {
      flex: 1;
      padding: 10px;
      border: none;
      border-bottom: 2px solid #eee;
      background: transparent;
      font-size: 0.95rem;
      color: #999;
      cursor: pointer;
    }
    .auth-tabs button.active { color: #764ba2; border-color: #764ba2; font-weight: 600; }

    .auth-form { display: flex; flex-direction: column; gap: 12px; padding: 20px 24px 24px; }
    .auth-form input {
      padding: 12px 14px;
      border: 2px solid #e2e2e2;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: #764ba2; }

    #otpCode {
      text-align: center;
      letter-spacing: 10px;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .primary-btn {
      padding: 12px;
      border: none;
      background: #764ba2;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .primary-btn:hover { background: #5d3a85; }
    .primary-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .link-btn {
      border: none;
      background: transparent;
      color: #764ba2;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px;
    }
    .link-btn:hover { text-decoration: underline; }

    .msg { font-size: 0.85rem; min-height: 18px; }
    .msg.error { color: #d33; }
    .msg.ok { color: #2a9d4a; }

    /* ---- Todo ---- */
    .input-row { display: flex; gap: 8px; padding: 20px 24px; }
    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e2e2e2;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #764ba2; }
    .input-row button {
      padding: 0 20px;
      border: none;
      background: #764ba2;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-row button:hover { background: #5d3a85; }

    .filters { display: flex; gap: 8px; padding: 0 24px 16px; }
    .filters button {
      flex: 1;
      padding: 8px;
      border: 1px solid #e2e2e2;
      background: #fff;
      border-radius: 8px;
      font-size: 0.82rem;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filters button.active { background: #764ba2; color: #fff; border-color: #764ba2; }

    ul { list-style: none; max-height: 340px; overflow-y: auto; }
    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f2f2f2;
    }
    li input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #764ba2; }
    li span { flex: 1; font-size: 0.95rem; color: #333; word-break: break-word; }
    li.done span { text-decoration: line-through; color: #aaa; }
    li .delete {
      border: none;
      background: transparent;
      color: #d33;
      font-size: 1.2rem;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    li .delete:hover { opacity: 1; }
    .empty { padding: 30px 24px; text-align: center; color: #bbb; font-size: 0.9rem; }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      border-top: 1px solid #eee;
      font-size: 0.82rem;
      color: #888;
    }
    footer button { border: none; background: transparent; color: #d33; cursor: pointer; font-size: 0.82rem; }
    footer button:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="app">
    <!-- ======== GİRİŞ / KAYIT ======== -->
    <section id="authView">
      <header>
        <h1>📝 Yapılacaklar</h1>
        <p>Devam etmek için giriş yap ya da kaydol</p>
      </header>
      <div class="auth-tabs">
        <button id="tabSignin" class="active" type="button">Giriş yap</button>
        <button id="tabSignup" type="button">Kaydol</button>
      </div>
      <form id="authForm" class="auth-form">
        <input type="email" id="email" placeholder="E-posta" autocomplete="email" required />
        <input type="password" id="password" placeholder="Şifre (en az 6 karakter)" autocomplete="current-password" minlength="6" required />
        <button type="submit" id="authSubmit" class="primary-btn">Giriş yap</button>
        <p class="msg" id="authMsg"></p>
      </form>
    </section>

    <!-- ======== OTP DOĞRULAMA ======== -->
    <section id="otpView" hidden>
      <header>
        <h1>✉️ E-posta doğrulama</h1>
        <p><strong id="otpEmail"></strong> adresine gönderdiğimiz 6 haneli kodu gir</p>
      </header>
      <form id="otpForm" class="auth-form">
        <input type="text" id="otpCode" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••••" autocomplete="one-time-code" required />
        <button type="submit" id="otpSubmit" class="primary-btn">Doğrula ve giriş yap</button>
        <button type="button" id="resendBtn" class="link-btn">Kodu tekrar gönder</button>
        <button type="button" id="backBtn" class="link-btn">← Geri dön</button>
        <p class="msg" id="otpMsg"></p>
      </form>
    </section>

    <!-- ======== TODO UYGULAMASI ======== -->
    <section id="appView" hidden>
      <header class="app-header">
        <div>
          <h1>📝 Yapılacaklar</h1>
          <p id="userEmail"></p>
        </div>
        <button id="logoutBtn" class="link-btn" type="button">Çıkış</button>
      </header>

      <div class="input-row">
        <input type="text" id="taskInput" placeholder="Yeni görev ekle..." />
        <button id="addBtn" type="button">Ekle</button>
      </div>

      <div class="filters">
        <button data-filter="all" class="active" type="button">Tümü</button>
        <button data-filter="active" type="button">Aktif</button>
        <button data-filter="done" type="button">Tamamlanan</button>
      </div>

      <ul id="taskList"></ul>

      <footer>
        <span id="counter">0 görev</span>
        <button id="clearDone" type="button">Tamamlananları temizle</button>
      </footer>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== Supabase ayarları =====
    const SUPABASE_URL = "https://cerskzqqlhruzvqcbxgr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlcnNrenFxbGhydXp2cWNieGdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NzI0NDQsImV4cCI6MjA5NjA0ODQ0NH0.tteIiwPPa18Xdlm5D0__DCZzscpZOyHJXRcXVJsUhmU";
    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // =============================

    // ---- Görünüm öğeleri ----
    const authView = document.getElementById("authView");
    const otpView = document.getElementById("otpView");
    const appView = document.getElementById("appView");

    // ---- Auth öğeleri ----
    const tabSignin = document.getElementById("tabSignin");
    const tabSignup = document.getElementById("tabSignup");
    const authForm = document.getElementById("authForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const authSubmit = document.getElementById("authSubmit");
    const authMsg = document.getElementById("authMsg");

    const otpForm = document.getElementById("otpForm");
    const otpCode = document.getElementById("otpCode");
    const otpEmailLabel = document.getElementById("otpEmail");
    const otpSubmit = document.getElementById("otpSubmit");
    const resendBtn = document.getElementById("resendBtn");
    const backBtn = document.getElementById("backBtn");
    const otpMsg = document.getElementById("otpMsg");

    const userEmailLabel = document.getElementById("userEmail");
    const logoutBtn = document.getElementById("logoutBtn");

    let mode = "signin";   // "signin" | "signup"
    let pendingEmail = ""; // OTP beklenen e-posta

    function showView(view) {
      authView.hidden = view !== "auth";
      otpView.hidden = view !== "otp";
      appView.hidden = view !== "app";
    }

    function setMsg(el, text, kind) {
      el.textContent = text || "";
      el.className = "msg" + (kind ? " " + kind : "");
    }

    // ---- Sekme değişimi ----
    function setMode(m) {
      mode = m;
      tabSignin.classList.toggle("active", m === "signin");
      tabSignup.classList.toggle("active", m === "signup");
      authSubmit.textContent = m === "signin" ? "Giriş yap" : "Kaydol";
      passwordInput.autocomplete = m === "signin" ? "current-password" : "new-password";
      setMsg(authMsg, "");
    }
    tabSignin.addEventListener("click", () => setMode("signin"));
    tabSignup.addEventListener("click", () => setMode("signup"));

    // ---- Giriş / Kayıt ----
    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) return;

      authSubmit.disabled = true;
      setMsg(authMsg, "Lütfen bekle...", "");

      if (mode === "signup") {
        const { error } = await db.auth.signUp({ email, password });
        authSubmit.disabled = false;
        if (error) return setMsg(authMsg, error.message, "error");
        startOtp(email, "Kaydın oluşturuldu. E-postana gelen 6 haneli kodu gir.");
      } else {
        const { error } = await db.auth.signInWithPassword({ email, password });
        authSubmit.disabled = false;
        if (error) {
          // E-posta henüz doğrulanmadıysa OTP ekranına yönlendir
          if (/confirm|verified|not confirmed/i.test(error.message)) {
            await db.auth.resend({ type: "signup", email });
            return startOtp(email, "E-postan doğrulanmamış. Yeni bir kod gönderdik.");
          }
          return setMsg(authMsg, error.message, "error");
        }
        // signInWithPassword başarılı → onAuthStateChange app'i açar
      }
    });

    // ---- OTP ekranı ----
    function startOtp(email, info) {
      pendingEmail = email;
      otpEmailLabel.textContent = email;
      otpCode.value = "";
      setMsg(otpMsg, info || "", info ? "ok" : "");
      showView("otp");
      otpCode.focus();
    }

    otpForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const token = otpCode.value.trim();
      if (token.length < 6) return setMsg(otpMsg, "6 haneli kodu gir.", "error");

      otpSubmit.disabled = true;
      setMsg(otpMsg, "Doğrulanıyor...", "");
      const { error } = await db.auth.verifyOtp({
        email: pendingEmail,
        token,
        type: "email", // signup onayı için OTP doğrulaması
      });
      otpSubmit.disabled = false;
      if (error) return setMsg(otpMsg, error.message, "error");
      // Başarılı → onAuthStateChange app'i açar
    });

    resendBtn.addEventListener("click", async () => {
      setMsg(otpMsg, "Kod tekrar gönderiliyor...", "");
      const { error } = await db.auth.resend({ type: "signup", email: pendingEmail });
      setMsg(otpMsg, error ? error.message : "Yeni kod gönderildi.", error ? "error" : "ok");
    });

    backBtn.addEventListener("click", () => {
      showView("auth");
      setMsg(authMsg, "");
    });

    logoutBtn.addEventListener("click", async () => {
      await db.auth.signOut();
    });

    // ---- Oturum durumu ----
    db.auth.onAuthStateChange((_event, session) => {
      if (session && session.user) {
        userEmailLabel.textContent = session.user.email;
        showView("app");
        loadTasks();
      } else {
        showView("auth");
        tasks = [];
      }
    });

    // =====================================================
    //                    TODO MANTIĞI
    // =====================================================
    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const counter = document.getElementById("counter");
    const clearDone = document.getElementById("clearDone");
    const filterBtns = document.querySelectorAll(".filters button");

    let tasks = [];
    let filter = "all";

    async function loadTasks() {
      const { data, error } = await db
        .from("todos")
        .select("*")
        .order("inserted_at", { ascending: true });
      if (error) {
        console.error(error);
        alert("Görevler yüklenemedi: " + error.message);
        return;
      }
      tasks = data;
      render();
    }

    function render() {
      taskList.innerHTML = "";
      const filtered = tasks.filter((t) => {
        if (filter === "active") return !t.done;
        if (filter === "done") return t.done;
        return true;
      });

      if (filtered.length === 0) {
        const li = document.createElement("li");
        li.className = "empty";
        li.textContent = "Henüz görev yok 🎉";
        taskList.appendChild(li);
      }

      filtered.forEach((task) => {
        const li = document.createElement("li");
        if (task.done) li.classList.add("done");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = task.done;
        checkbox.addEventListener("change", () => toggleTask(task.id));

        const span = document.createElement("span");
        span.textContent = task.text;

        const del = document.createElement("button");
        del.className = "delete";
        del.innerHTML = "&times;";
        del.addEventListener("click", () => deleteTask(task.id));

        li.append(checkbox, span, del);
        taskList.appendChild(li);
      });

      const remaining = tasks.filter((t) => !t.done).length;
      counter.textContent = `${remaining} görev kaldı`;
    }

    async function addTask() {
      const text = taskInput.value.trim();
      if (!text) return;
      taskInput.value = "";
      const { data, error } = await db
        .from("todos")
        .insert({ text, done: false })
        .select()
        .single();
      if (error) {
        console.error(error);
        alert("Görev eklenemedi: " + error.message);
        return;
      }
      tasks.push(data);
      render();
    }

    async function toggleTask(id) {
      const task = tasks.find((t) => t.id === id);
      if (!task) return;
      const { error } = await db.from("todos").update({ done: !task.done }).eq("id", id);
      if (error) { console.error(error); alert("Güncellenemedi: " + error.message); return; }
      task.done = !task.done;
      render();
    }

    async function deleteTask(id) {
      const { error } = await db.from("todos").delete().eq("id", id);
      if (error) { console.error(error); alert("Silinemedi: " + error.message); return; }
      tasks = tasks.filter((t) => t.id !== id);
      render();
    }

    addBtn.addEventListener("click", addTask);
    taskInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addTask(); });

    clearDone.addEventListener("click", async () => {
      const { error } = await db.from("todos").delete().eq("done", true);
      if (error) { console.error(error); alert("Temizlenemedi: " + error.message); return; }
      tasks = tasks.filter((t) => !t.done);
      render();
    });

    filterBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        filterBtns.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        filter = btn.dataset.filter;
        render();
      });
    });

    // İlk yüklemede mevcut oturumu kontrol et
    (async () => {
      const { data } = await db.auth.getSession();
      if (!data.session) showView("auth");
    })();
  </script>
</body>
</html>
